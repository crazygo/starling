name: starling
description: 星仔 (Starling) - Your Personal Stargazing Guide

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  location: ^6.0.2
  sensors_plus: ^4.0.2
  url_launcher: ^6.3.0
  provider: ^6.1.2
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/stars.json
    - assets/data/constellations.json
    - assets/data/constellations_chinese.json
    - assets/data/daily_cards.json
    # FlatBuffers binary catalogs produced by the data pipeline (tool/).
    # Run `cd tool && ./build.sh` to generate these files.
    - assets/bin/
