name: PR Screenshot Preview

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # 2. Flutter 环境
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. 依赖 & 构建
      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build web
        run: flutter build web --release

      # 4. 启动本地 HTTP server（serve build/web/）
      - name: Install serve
        run: npm install -g serve

      - name: Start local server
        run: serve -s build/web -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 30000

      # 5. Playwright 截图
      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Take screenshots
        run: node .github/scripts/screenshot.js

      # 6. 上传 artifact
      - name: Upload screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 7

      # 7. 发布截图并更新 PR comment
      - name: Publish screenshots to PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node .github/scripts/publish_pr_screenshots.js
