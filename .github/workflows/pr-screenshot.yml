name: PR Screenshot Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Flutter 环境
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      # 3. 依赖 & 构建
      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build web
        run: flutter build web --release

      # 4. 启动本地 HTTP server（serve build/web/）
      - name: Install serve
        run: npm install -g serve

      - name: Start local server
        run: serve -s build/web -l 8080 &

      - name: Wait for server
        run: npx wait-on http://localhost:8080 --timeout 30000

      # 5. Playwright 截图
      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Take screenshots
        run: node .github/scripts/screenshot.js

      # 6. 上传 artifact
      - name: Upload screenshots
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots-${{ github.event.pull_request.number }}
          path: screenshots/
          retention-days: 7

      # 7. 发 PR comment
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // List screenshots that were actually generated
            const screenshotFiles = fs.existsSync('screenshots')
              ? fs.readdirSync('screenshots').filter(f => f.endsWith('.png'))
              : [];

            const body = [
              '## 📸 页面截图预览',
              '',
              `构建时间：${new Date().toISOString().replace('T', ' ').slice(0, 19)} UTC`,
              `分支：\`${context.payload.pull_request.head.ref}\``,
              '',
              '截图已生成，可在以下链接下载查看：',
              `👉 [下载截图 Artifact](${artifactUrl})`,
              '',
              '| 截图文件 |',
              '|----------|',
              ...screenshotFiles.map(f => `| \`${f}\` |`),
              '',
              '<!-- pr-screenshot-bot -->',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- pr-screenshot-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
