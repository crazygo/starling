name: PR Auto Review

# 此 workflow 用于自动化 PR 审查流程
# - 只在已存在 inline review comments 时才触发 @copilot 处理
# - pull_request_review submitted 时等待 10s，确保 inline comments 已写入 API
# - concurrency 控制避免同一 PR 并发执行，防止重复评论

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: pr-auto-review-${{ github.event.pull_request.number || github.event.review.pull_request_url }}
  cancel-in-progress: false

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Wait for review comments to be available
        run: sleep 10

      - name: Check and comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STARLING_COPILOT_TRIGGER || secrets.GITHUB_TOKEN }}
          script: |
            const pullNumber = context.payload.pull_request?.number;

            if (!pullNumber) {
              console.log('Could not determine pull request number, skipping');
              return;
            }

            const COPILOT_REVIEW_MARKER = '<!-- copilot-auto-review-request -->';
            const commentBody = `${COPILOT_REVIEW_MARKER}\n@copilot Please go through the PR review comments and address them. Use your own judgment—don't just blindly follow the suggestions. Commit code for the necessary fixes, but for comments you think should be ignored, just leave a reply explaining your reasoning. Make sure to mark all comments as resolved once you're done.`;

            // 检查是否存在 inline review comments
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber
            });

            if (reviewComments.length === 0) {
              console.log('No inline review comments found, skipping comment');
              return;
            }

            // 去重：检查是否已存在相同的评论，避免重复发送（使用 paginate 避免分页遗漏）
            const existingComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullNumber,
                per_page: 100
              }
            );

            const alreadyCommented = existingComments.some(c => c.body && c.body.includes(COPILOT_REVIEW_MARKER));
            if (alreadyCommented) {
              console.log('Copilot review request already posted, skipping duplicate');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              body: commentBody
            });
            console.log(`Copilot review comment posted (${reviewComments.length} review comments found)`);